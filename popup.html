<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MeetMark</title>
  <style>
    :root {
      color-scheme: light;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 280px;
      margin: 0;
      padding: 16px;
      background: #ffffff;
      color: #1f1f1f;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 4px 0;
      font-weight: 600;
    }
    p.sub {
      font-size: 12px;
      margin: 0 0 12px 0;
      color: #5f6368;
    }
    button {
      width: 100%;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      background: #4b53bc;
      color: #ffffff;
      cursor: pointer;
    }
    button:hover {
      background: #3f46a5;
    }
    button:disabled {
      background: #c2c5d9;
      cursor: not-allowed;
    }
    .status {
      margin-top: 12px;
      font-size: 12px;
      line-height: 1.4;
      min-height: 16px;
      word-wrap: break-word;
    }
    .status.info { color: #5f6368; }
    .status.success { color: #137333; }
    .status.warn { color: #b06000; }
    .status.error { color: #b00020; }
  </style>
</head>
<body>
  <h1>MeetMark</h1>
  <p class="sub">Export the current Teams transcript as Markdown.</p>
  <button id="exportBtn">Export transcript</button>
  <div id="status" class="status info"></div>
  <script src="popup.js"></script>
</body>
</html>
