<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MeetMark</title>
  <style>
    :root {
      color-scheme: light;
      --canvas: #F4F5F4;
      --ink: #141414;
      --muted: #5E5E5E;
      --border: #E0E2E0;
      --accent: #3D7575;
      --accent-hover: #2C5858;
      --accent-tint: #EAF1F1;
      --success: #3A7A4A;
      --negative: #9B3A3A;
      --warning: #A07A20;
    }
    * { box-sizing: border-box; }
    body {
      font-family: "DM Sans", -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 320px;
      margin: 0;
      padding: 16px;
      background: var(--canvas);
      color: var(--ink);
      font-size: 13px;
      line-height: 1.4;
    }
    h1 {
      font-family: "Syne", "DM Sans", -apple-system, sans-serif;
      font-size: 16px;
      margin: 0 0 4px 0;
      font-weight: 700;
      letter-spacing: -0.01em;
    }
    p.sub {
      font-size: 12px;
      margin: 0 0 14px 0;
      color: var(--muted);
    }
    button {
      font-family: inherit;
      padding: 9px 12px;
      font-size: 13px;
      font-weight: 500;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: background-color 150ms ease-out, border-color 150ms ease-out, color 150ms ease-out;
    }
    button.primary {
      background: var(--accent);
      color: #ffffff;
    }
    button.primary:hover {
      background: var(--accent-hover);
    }
    button.primary:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: not-allowed;
    }
    button.secondary {
      background: transparent;
      color: var(--ink);
      border: 1px solid var(--ink);
    }
    button.secondary:hover {
      background: var(--accent-tint);
      border-color: var(--accent);
    }
    button.secondary:disabled {
      color: var(--muted);
      border-color: var(--border);
      background: transparent;
      cursor: not-allowed;
    }
    .sectionLabel {
      font-size: 10px;
      color: var(--muted);
      margin: 0 0 6px 2px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      font-weight: 600;
    }
    .fullSelect {
      width: 100%;
      padding: 9px 10px;
      border-radius: 4px;
      border: 1px solid var(--border);
      font-size: 13px;
      font-family: inherit;
      background: #ffffff;
      color: var(--ink);
    }
    .fullSelect:hover, .fullSelect:focus {
      border-color: var(--accent);
      outline: none;
    }
    .grabFull {
      margin-top: 8px;
    }
    .grabFull button {
      width: 100%;
    }
    .divider {
      text-align: center;
      font-size: 10px;
      color: var(--muted);
      margin: 14px 0 10px;
      letter-spacing: 0.6px;
    }
    .png button {
      width: 100%;
    }
    .cancelRow {
      margin-top: 12px;
      display: none;
    }
    .cancelRow.visible {
      display: block;
    }
    .cancelRow button {
      width: 100%;
    }
    .settingsSection {
      margin-top: 16px;
      padding-top: 14px;
      border-top: 1px solid var(--border);
    }
    .dlSegment {
      display: flex;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
      margin-bottom: 6px;
    }
    .dlSeg {
      flex: 1 1 0;
      padding: 7px 8px;
      font-size: 12px;
      font-weight: 500;
      background: #ffffff;
      color: var(--muted);
      border: none;
      border-radius: 0;
      cursor: pointer;
    }
    .dlSeg + .dlSeg {
      border-left: 1px solid var(--border);
    }
    .dlSeg:hover:not(.active) {
      background: var(--accent-tint);
      color: var(--ink);
    }
    .dlSeg.active {
      background: var(--accent);
      color: #ffffff;
    }
    .folderInfo {
      padding: 2px 0 0;
    }
    .folderInfo.hidden {
      display: none;
    }
    .folderPath {
      display: block;
      font-size: 11px;
      color: var(--muted);
      font-family: "JetBrains Mono", "IBM Plex Mono", Menlo, Consolas, monospace;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      direction: rtl;
      text-align: left;
    }
    .status {
      margin-top: 14px;
      font-size: 12px;
      line-height: 1.5;
      min-height: 18px;
      word-wrap: break-word;
    }
    .status.info { color: var(--muted); }
    .status.success { color: var(--success); }
    .status.warn { color: var(--warning); }
    .status.error { color: var(--negative); }
    .reveal-link { color: inherit; text-decoration: underline; cursor: pointer; }
    .reveal-link:hover { opacity: 0.75; }
    .progressBar {
      margin-top: 8px;
      height: 3px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }
    .progressBar.active {
      display: block;
    }
    .progressBar .fill {
      height: 100%;
      width: 40%;
      background: var(--accent);
      border-radius: 2px;
      animation: slide 1.4s ease-in-out infinite;
    }
    .progressBar.determinate .fill {
      animation: none;
      transition: width 0.15s linear;
    }
    @keyframes slide {
      0%   { transform: translateX(-100%); }
      50%  { transform: translateX(100%); }
      100% { transform: translateX(250%); }
    }
    @media (prefers-reduced-motion: reduce) {
      .progressBar .fill { animation: none; opacity: 0.6; }
      button { transition: opacity 100ms ease-out; }
    }
    .detail {
      margin-top: 4px;
      font-size: 11px;
      color: var(--muted);
    }
  </style>
</head>
<body>
  <h1>MeetMark</h1>
  <p class="sub">Export the transcript or capture the full page.</p>

  <div class="sectionLabel">Grab transcript as</div>
  <select id="formatSelect" class="fullSelect" aria-label="Export format">
    <option value="md">Markdown (.md)</option>
    <option value="txt">Plain text (.txt)</option>
    <option value="pdf">PDF (.pdf)</option>
  </select>
  <div class="grabFull">
    <button id="grabBtn" class="primary">Grab</button>
  </div>

  <div class="divider">— or —</div>

  <div class="png">
    <button id="pngBtn" class="secondary">Capture full page as PNG</button>
  </div>

  <div class="settingsSection">
    <div class="sectionLabel">Save downloads</div>
    <div class="dlSegment" role="tablist" aria-label="Download mode">
      <button class="dlSeg active" id="dlSegAuto" type="button" role="tab" aria-selected="true">Save automatically</button>
      <button class="dlSeg" id="dlSegAsk" type="button" role="tab" aria-selected="false">Ask each time</button>
    </div>
    <div class="folderInfo" id="folderInfo">
      <span class="folderPath" id="folderPath" title="Saves to your Downloads folder">Saves to your Downloads folder</span>
    </div>
  </div>

  <div class="progressBar" id="progressBar"><div class="fill"></div></div>
  <div id="status" class="status info"></div>
  <div id="detail" class="detail"></div>

  <div class="cancelRow" id="cancelRow">
    <button id="cancelBtn" class="secondary">Cancel</button>
  </div>
  <script src="popup.js"></script>
</body>
</html>
