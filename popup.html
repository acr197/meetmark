<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>MeetMark</title>
  <style>
    :root {
      color-scheme: light;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      width: 300px;
      margin: 0;
      padding: 16px;
      background: #ffffff;
      color: #1f1f1f;
    }
    h1 {
      font-size: 15px;
      margin: 0 0 4px 0;
      font-weight: 600;
    }
    p.sub {
      font-size: 12px;
      margin: 0 0 12px 0;
      color: #5f6368;
    }
    .buttonRow {
      display: flex;
      gap: 8px;
    }
    button {
      flex: 1;
      padding: 10px 12px;
      font-size: 13px;
      font-weight: 600;
      border: none;
      border-radius: 6px;
      cursor: pointer;
    }
    button.primary {
      background: #4b53bc;
      color: #ffffff;
    }
    button.primary:hover {
      background: #3f46a5;
    }
    button.primary:disabled {
      background: #c2c5d9;
      cursor: not-allowed;
    }
    button.secondary {
      background: #ffffff;
      color: #4b53bc;
      border: 1px solid #4b53bc;
    }
    button.secondary:hover {
      background: #f1f2fb;
    }
    button.secondary:disabled {
      color: #c2c5d9;
      border-color: #c2c5d9;
      cursor: not-allowed;
    }
    .status {
      margin-top: 14px;
      font-size: 12px;
      line-height: 1.5;
      min-height: 18px;
      word-wrap: break-word;
    }
    .status.info { color: #5f6368; }
    .status.success { color: #137333; }
    .status.warn { color: #b06000; }
    .status.error { color: #b00020; }
    .progressBar {
      margin-top: 8px;
      height: 3px;
      background: #eeeef6;
      border-radius: 2px;
      overflow: hidden;
      display: none;
    }
    .progressBar.active {
      display: block;
    }
    .progressBar .fill {
      height: 100%;
      width: 40%;
      background: #4b53bc;
      border-radius: 2px;
      animation: slide 1.4s ease-in-out infinite;
    }
    @keyframes slide {
      0%   { transform: translateX(-100%); }
      50%  { transform: translateX(100%); }
      100% { transform: translateX(250%); }
    }
    .detail {
      margin-top: 4px;
      font-size: 11px;
      color: #80868b;
    }
  </style>
</head>
<body>
  <h1>MeetMark</h1>
  <p class="sub">Export the current Teams transcript as Markdown.</p>
  <div class="buttonRow">
    <button id="exportBtn" class="primary">Export transcript</button>
    <button id="cancelBtn" class="secondary" disabled>Cancel</button>
  </div>
  <div class="progressBar" id="progressBar"><div class="fill"></div></div>
  <div id="status" class="status info"></div>
  <div id="detail" class="detail"></div>
  <script src="popup.js"></script>
</body>
</html>
